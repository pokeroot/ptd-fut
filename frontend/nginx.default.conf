server {
    listen 80;
    server_name localhost; # O tu dominio en producción

    # Raíz para los archivos estáticos de React
    root /usr/share/nginx/html;
    index index.html index.htm;

    # Servir archivos estáticos directamente
    location / {
        try_files $uri $uri/ /index.html; # Para el enrutamiento de React (SPA)
    }

    # Proxy para las llamadas a la API del backend Django
    # Asumimos que el backend estará disponible en un servicio llamado 'backend' en el puerto 8000
    # Esto se configurará en docker-compose.yml
    location /api {
        proxy_pass http://backend:8000; # 'backend' será el nombre del servicio Django en docker-compose
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
        proxy_redirect off;
        # Opcional: para WebSockets si se usaran en el futuro
        # proxy_http_version 1.1;
        # proxy_set_header Upgrade $http_upgrade;
        # proxy_set_header Connection "upgrade";
    }

    # Configuración para evitar errores de tipo MIME con JavaScript y CSS en algunos navegadores
    location ~* \.(?:css|js)$ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public";
        access_log off;
    }

    # Opcional: compresión gzip para mejorar el rendimiento
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_min_length 256;
    gzip_types text/plain text/css application/json application/javascript application/x-javascript text/xml application/xml application/xml+rss text/javascript application/vnd.ms-fontobject application/x-font-ttf font/opentype image/svg+xml image/x-icon;
}
